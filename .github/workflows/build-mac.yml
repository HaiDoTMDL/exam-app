name: Build macOS Client

on:
  push:
    branches: [ "main", "master" ] 
  workflow_dispatch: 

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Cài đặt Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Cài đặt thư viện Client
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
        
    - name: Build App bằng Pyinstaller
      run: pyinstaller --windowed --name="IUH_Exam_Client" exam_client_gui.py
      
    - name: Đóng gói và Lưu file
      uses: actions/upload-artifact@v4
      with:
        name: macos-client-app
        path: dist/IUH_Exam_Client.app
